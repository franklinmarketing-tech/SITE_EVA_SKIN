<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Playfair+Display:ital,wght@1,900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact}
body{width:512px;height:512px;background:linear-gradient(135deg,#4c1d95 0%,#7c3aed 50%,#a855f7 100%);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif}
.logo{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
.icon{width:160px;height:160px;border-radius:36px;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-style:italic;font-weight:900;color:#4c1d95;font-size:120px;line-height:1;padding-bottom:14px;box-shadow:0 20px 50px rgba(0,0,0,.3),inset 0 4px 0 rgba(255,255,255,.6);margin-bottom:8px}
.brand{display:flex;align-items:baseline;gap:5px}
.eva{font-family:'Playfair Display',serif;font-style:italic;font-weight:900;font-size:70px;color:#fff;letter-spacing:-1.5px}
.skin{font-family:'Inter',sans-serif;font-weight:800;font-size:70px;color:#fff;letter-spacing:-1.5px;opacity:.85}
.caps{margin-top:6px;font-family:'Inter',sans-serif;font-weight:700;font-size:18px;color:#fff;letter-spacing:8px;text-transform:uppercase;opacity:.8}
</style>
</head>
<body>
<div class="logo">
  <div class="icon">E</div>
  <div class="brand"><span class="eva">Eva</span><span class="skin">Skin</span></div>
  <div class="caps">CAPS</div>
</div>
</body>
</html>
