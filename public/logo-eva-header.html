<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Playfair+Display:ital,wght@1,900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact}
body{width:600px;height:160px;background:transparent;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif}
.logo{display:flex;align-items:center;gap:14px}
.icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#4c1d95 0%,#7c3aed 50%,#a855f7 100%);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-style:italic;font-weight:900;color:#fff;font-size:42px;line-height:1;padding-bottom:6px;box-shadow:0 12px 24px rgba(124,58,237,.35),inset 0 2px 0 rgba(255,255,255,.2)}
.text-wrap{display:flex;flex-direction:column;line-height:1}
.brand{display:flex;align-items:baseline;gap:3px}
.eva{font-family:'Playfair Display',serif;font-style:italic;font-weight:900;font-size:42px;color:#2d1b4e;letter-spacing:-1px}
.skin{font-family:'Inter',sans-serif;font-weight:800;font-size:42px;color:#7c3aed;letter-spacing:-1px}
.caps{margin-top:4px;font-family:'Inter',sans-serif;font-weight:700;font-size:11px;color:#a855f7;letter-spacing:4px;text-transform:uppercase}
</style>
</head>
<body>
<div class="logo">
  <div class="icon">E</div>
  <div class="text-wrap">
    <div class="brand"><span class="eva">Eva</span><span class="skin">Skin</span></div>
    <div class="caps">CAPS</div>
  </div>
</div>
</body>
</html>
